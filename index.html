<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Doação de sangue</title>
</head>

<header>
    <img class="coracaoCabeca" src="assets/coracao_png.webp" alt="coracao">
    <h1><img src="assets/asa_esquerda.gif" alt="esquerda"> Formulário de doação de sangue! <img src="assets/asa_direita.gif" alt="direita"></h1>
    <img class="coracaoCabeca" src="assets/coracao_png.webp" alt="coracao">
</header>

<body>

    <div id="meio">
    <form id="doacaoSangue">
        <label for="nome"><h3>Nome Completo</h3></label>
        <input type="text" id="nome" name="nome">

        <label for="email"><h3>E-mail</h3></label>
        <input type="email" id="email" name="email">

        <label for="idade"><h3>idade</h3></label>
        <input type="number" id="idade" name="idade">

        <label for="peso"><h3>Peso</h3></label>
        <input type="number" id="peso" name="peso">

        <label for="tipoSanguineo"><h3>Tipo Sanguíneo</h3></label>
        <select name="tipoSanguineo" id="tipoSanguineo">
            <option value="">Selecione</option>
            <option value="A+">A +</option>
            <option value="A-">A -</option>
            <option value="B+">B +</option>
            <option value="B-">B -</option>
            <option value="AB+">AB +</option>
            <option value="AB-">AB -</option>
            <option value="O+">O +</option>
            <option value="O-">O -</option>
        </select>

        <label for="tel"><h3>Telefone</h3></label>
        <input type="text" id="tel" name="tel">

        <label for="cidade"><h3>Cidade</h3></label>
        <input type="text" id="cidade" name="cidade">

        <label for="estado"><h3>Estado</h3></label>
        <input type="text" id="estado" name="estado">

        <button id="envio" type="submit"><h3>Enviar</h3></button>

        <script src="scripts/script.js"></script>
    </form>
    </div>
</body>

</html>
