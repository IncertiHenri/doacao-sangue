<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doação de sangue</title>
</head>
<body>
    
    <form id="doacaoSangue">
        <label for="nome">Nome Completo</label>
        <input type="text" id="nome" name="nome">
        
        <label for="email">E-mail</label>
        <input type="text" id="email" name="email">

        <label for="idade">Idade</label>
        <input type="number" id="idade" name="idade">

        <label for="peso">Peso</label>
        <input type="number" id="peso" name="peso">

        <label for="tipoSanguineo">Tipo Sanguineo</label>
        <select name="tipoSanguineo" id="tipoSanguineo">
            <option value="">Selecione</option>
            <option value="A+">A +</option>
            <option value="A-">A -</option>
            <option value="B+">B +</option>
            <option value="B-">B -</option>
            <option value="AB+">AB +</option>
            <option value="AB-">AB -</option>
            <option value="O+">O +</option>
            <option value="O-">O -</option>
        </select>

        <label for="tel">Peso</label>
        <input type="text" id="tel" name="tel">

        <label for="cidade">Peso</label>
        <input type="text" id="cidade" name="cidade">

        <label for="estado">Peso</label>
        <input type="text" id="estado" name="estado">
    </form>

</body>
</html>
